# ── HostelHub — one-command stack (MongoDB + API + web) ───────────────────
# Usage:
#   cp .env.example .env   # set JWT secrets (and optional SMTP/Razorpay)
#   docker compose up -d --build
#   open http://localhost:8080   (demo data is seeded on first boot)
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/hostelhub
      USE_MEMORY_DB: 'false'
      SEED_ON_BOOT: 'true' # seed demo data once; set 'false' for a clean prod tenant
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-please-change-this-access-secret-in-env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-please-change-this-refresh-secret-in-env}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      # Optional integrations (leave unset to use mock/console fallbacks):
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-HostelHub <no-reply@hostelhub.com>}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      BUSINESS_NAME: ${BUSINESS_NAME:-HostelHub}
      BUSINESS_ADDRESS: ${BUSINESS_ADDRESS:-}
      BUSINESS_GSTIN: ${BUSINESS_GSTIN:-}
    volumes:
      - uploads:/app/src/uploads
    expose:
      - '5000'

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo-data:
  uploads:
